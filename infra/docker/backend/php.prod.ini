; Hardening + sane defaults for the production PHP-FPM image.

; Don't leak PHP version/stack details to clients or logs.
expose_php = Off

; Never render errors to the response body in production; Laravel's own
; logging (APP_DEBUG=false) is the source of truth for error details.
display_errors = Off
display_startup_errors = Off
log_errors = On

; Opcache: enabled with timestamp validation off for speed. Rebuild the image
; to ship code changes rather than relying on file-change detection.
opcache.enable = 1
opcache.validate_timestamps = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000

; Reasonable upload/body limits for a fitness-class attendance API (no file uploads today).
upload_max_filesize = 10M
post_max_size = 10M
