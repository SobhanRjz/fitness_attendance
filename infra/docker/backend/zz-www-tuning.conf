; Overrides a subset of the [www] pool's directives from the base image's
; default www.conf (pm.max_children = 5, sized for a tiny demo box). Loaded
; after www.conf (php-fpm.d/*.conf is included alphabetically, "zz" sorts
; last), so only the directives listed here are overridden.
;
; Sizing: measured ~31MB RSS per worker under load (see loadtest/README.md).
; 20 workers ~= 620MB, comfortably inside this host's available RAM. Revisit
; this number after re-running the load test against a container with a real
; memory limit set, and after checking CPU headroom (see loadtest/README.md).
[www]
pm = dynamic
pm.max_children = 20
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 12
