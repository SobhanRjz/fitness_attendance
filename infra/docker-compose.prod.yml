name: fitness-attendance-prod

# Production stack: immutable app image (no bind mounts, no dev tooling) behind
# Nginx. Only the webserver port is published; db and app are reachable solely
# over the internal Docker network.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:?set DB_DATABASE in infra/.env}
      POSTGRES_USER: ${DB_USERNAME:?set DB_USERNAME in infra/.env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in infra/.env}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: ..
      dockerfile: infra/docker/backend/Dockerfile
      target: app
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Fitness Attendance}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?set APP_KEY in infra/.env}
      APP_URL: ${APP_URL:?set APP_URL in infra/.env}
      LOG_CHANNEL: stack
      LOG_LEVEL: error
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    # Immutable, read-only container: the app never needs to write outside
    # storage/ and bootstrap/cache/ (both backed by their own volumes below).
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  webserver:
    build:
      context: ..
      dockerfile: infra/docker/backend/Dockerfile
      target: webserver
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  # Static export of the Expo **web** build only — this is not the iOS/Android
  # app. Those ship separately via EAS Build / app store binaries, not Docker.
  mobile:
    build:
      context: ..
      dockerfile: infra/docker/mobile/Dockerfile
      target: prod
      args:
        EXPO_PUBLIC_API_URL: ${MOBILE_API_URL:?set MOBILE_API_URL in infra/.env, e.g. https://api.example.com/api}
    restart: unless-stopped
    ports:
      - "${MOBILE_PORT:-8081}:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

volumes:
  db_data:
  storage_data:
  bootstrap_cache:
